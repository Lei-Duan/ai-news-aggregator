# GitHub repositories and topics - AI tools by indie developers
# STRICTLY LIMITED to reduce API costs - max 3-5 topics only
# NOTE: No organizations — big orgs (openai/anthropic/huggingface) flood results with known repos.
#       We rely purely on topic search + star velocity to find fast-rising new projects.
github:
  # Topics for AI + Build in Public - STRICT LIMIT for cost control
  # Repos are sorted by star_velocity (stars/day) to surface fast-rising new projects
  topics:
    - "buildinpublic"
    - "ai-saas"
    - "indie-hacker"
    - "llm"
    - "ai-agent"

# Reddit subreddits - Build in Public & AI Tools (via JSON API, real score data)
# Narrowed to high signal-to-noise subreddits only.
# Fetches today's top posts (/top.json?t=day) with real upvote scores.
reddit:
  subreddits:
    # AI focused — very active, high signal
    - "LocalLLaMA"        # local/open-source LLM practitioners
    - "MachineLearning"   # research + applied ML
    - "singularity"       # AI news & hype, fast moving
    - "artificial"        # general AI discussion
    - "ChatGPT"           # real user AI experiences
