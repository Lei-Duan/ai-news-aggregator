name: Daily AI News Briefing

on:
  schedule:
    - cron: '5 17 * * *'   # 09:05 PST (= 17:05 UTC)
  workflow_dispatch:        # 手动触发

permissions:
  contents: read            # 只需要读权限，不再 commit state

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: state/
          # 每次 run 写新 key，restore-keys 前缀匹配保证总能拿到最近一次的 cache
          key: dedup-state-${{ github.run_id }}
          restore-keys: |
            dedup-state-

      - name: Create required directories
        run: mkdir -p logs state

      - name: DEBUG Notion token (temporary)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          # Length, prefix, suffix. Secret value itself is auto-masked by Actions.
          echo "Token length: ${#NOTION_TOKEN}"
          echo "Token prefix: ${NOTION_TOKEN:0:4}"
          echo "Token suffix: ${NOTION_TOKEN: -3}"
          echo "DB id length: ${#NOTION_DATABASE_ID}"
          # Inline call to /v1/users/me — verifies the runtime token is valid
          echo "--- /v1/users/me ---"
          curl -sS -o /tmp/me.json -w "HTTP %{http_code}\n" \
            https://api.notion.com/v1/users/me \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28"
          python3 -c "import json; d=json.load(open('/tmp/me.json')); print('user object:', d.get('object'), '| bot name:', d.get('name'), '| code:', d.get('code'), '| msg:', d.get('message'))"
          # Probe DB read — confirms integration is connected to that DB
          echo "--- /v1/databases/{id} ---"
          curl -sS -o /tmp/db.json -w "HTTP %{http_code}\n" \
            "https://api.notion.com/v1/databases/$NOTION_DATABASE_ID" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28"
          python3 -c "import json; d=json.load(open('/tmp/db.json')); print('db object:', d.get('object'), '| title:', (d.get('title') or [{}])[0].get('plain_text','?'), '| code:', d.get('code'), '| msg:', d.get('message'))"
          # Probe what the SDK is doing — POST /v1/pages with a minimal body,
          # using the same Notion-Version the installed SDK sends by default.
          SDK_VER=$(python3 -c "import notion_client, inspect; from notion_client.client import ClientOptions; import dataclasses; print(next(f.default for f in dataclasses.fields(ClientOptions) if f.name=='notion_version'))")
          echo "SDK default Notion-Version: $SDK_VER"
          echo "--- POST /v1/pages (Notion-Version = SDK default) ---"
          curl -sS -o /tmp/post.json -w "HTTP %{http_code}\n" \
            -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: $SDK_VER" \
            -H "Content-Type: application/json" \
            --data "{\"parent\":{\"database_id\":\"$NOTION_DATABASE_ID\"},\"properties\":{\"Name\":{\"title\":[{\"text\":{\"content\":\"debug-probe-$(date -u +%s)\"}}]}}}"
          cat /tmp/post.json; echo
          echo "--- POST /v1/pages (Notion-Version = 2022-06-28) ---"
          curl -sS -o /tmp/post2.json -w "HTTP %{http_code}\n" \
            -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data "{\"parent\":{\"database_id\":\"$NOTION_DATABASE_ID\"},\"properties\":{\"Name\":{\"title\":[{\"text\":{\"content\":\"debug-probe2-$(date -u +%s)\"}}]}}}"
          cat /tmp/post2.json; echo

      - name: Run daily briefing
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SCHEDULE_TIME: "09:00"
          TIMEZONE: "US/Pacific"
          MIN_QUALITY_SCORE: "0.7"
          MAX_ARTICLES_PER_SOURCE: "10"
          SUMMARY_MAX_LENGTH: "200"
          LOG_LEVEL: "INFO"
          LOG_FILE: "logs/aggregator.log"
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python3 main.py --mode once

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: logs/
          retention-days: 7
