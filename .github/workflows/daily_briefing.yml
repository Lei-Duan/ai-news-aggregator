name: Daily AI News Briefing

on:
  schedule:
    - cron: '5 17 * * *'   # 09:05 PST (= 17:05 UTC)
  workflow_dispatch:        # 手动触发

permissions:
  contents: write           # 需要写权限来 commit state 文件

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs state

      - name: Run daily briefing
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          POD2TXT_API_KEY: ${{ secrets.POD2TXT_API_KEY }}
          SCHEDULE_TIME: "09:00"
          TIMEZONE: "US/Pacific"
          MIN_QUALITY_SCORE: "0.7"
          MAX_ARTICLES_PER_SOURCE: "10"
          SUMMARY_MAX_LENGTH: "200"
          LOG_LEVEL: "INFO"
          LOG_FILE: "logs/aggregator.log"
        run: python3 main.py --mode once

      - name: Commit deduplication state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_items.json
          git diff --staged --quiet || git commit -m "chore: update dedup state [skip ci]"
          git push

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: logs/
          retention-days: 7
